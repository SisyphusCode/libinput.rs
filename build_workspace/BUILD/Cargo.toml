[package]
name = "libinput-rs"
version = "0.1.0"
edition = "2021"
description = "A memory-safe, high-performance input daemon for Wayland compositors."

[dependencies]
evdev = "0.12"
mio = { version = "0.8", features = ["os-poll", "net"] }
nix = { version = "0.27", features = ["ioctl", "fs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
env_logger = "0.11"
